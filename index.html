<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/Project-css.css">
</head>
<body class="font-sans bg-slate-800 transition-colors duration-300">
    <div id="balance" class="grid grid-cols-1 gap-4 p-4">
        
        <!-- EXPENSE -->
        <section class="flex">
            <h2 id="app_title" class="w-5/6 mr-4 font-bold text-center text-slate-100 bg-slate-700 p-4 rounded-md shadow-md transition-colors duration-300">
                Expense & Budget Visualizer
            </h2>

            <button id="theme_toggle" onclick="toggleTheme()" 
                class="w-1/6 gap-2 p-2 rounded-md font-semibold text-sm transition-colors duration-300 bg-slate-600 hover:bg-slate-500 text-slate-100"
                aria-label="Toggle dark/light mode">
                <span id="theme_icon">☀️</span>
                <span id="theme_label">Light</span>
            </button>
        </section>

        <!-- TOTAL BALANCE -->
        <section class="shadow-md rounded-md mt-5 p-5 bg-slate-700">
            <p class="text-sm text-slate-200 font-medium text-center">TOTAL BALANCE</p>
            <p id="total_balance" class="text-[36px] text-slate-200 p-2 font-bold text-center"></p>
        </section>

        <!-- ADD NEW CATEGORY -->
        <section id="new_category_form" class="grid grid-cols-3 gap-4">
            <div>
                <button id="btn_new_category" onclick="showAddCategory()" class="mt-5 hover:bg-emerald-600 w-full bg-emerald-500 rounded-md p-2 font-bold text-white">
                    Add New Category<br><small>(optional)</small>
                </button>
            </div>
        </section>

        <!-- TRANSACTION FORM -->
        <section id="transaction_form_body" class="shadow-md rounded-md mt-5 bg-slate-700">
            <div>
                <form id="transaction_form" class="p-4">
                    <p class="text-left font-bold text-lg text-slate-100">Add Transaction</p>
                    <div class="mt-3">
                        <label for="item_name_txt" class="text-slate-200">Item Name</label><br>
                        <input id="item_name_txt" class="text-slate-800 w-full mt-2 bg-slate-100 rounded-md p-2" type="text" required>
                    </div>
                    
                    <div class="mt-3">
                        <label for="amount_txt" class="text-slate-200">Amount</label><br>
                        <input id="amount_txt" class="text-slate-800 w-full mt-2 bg-slate-100 rounded-md p-2" type="number" step="any" required>
                    </div>

                    <div class="mt-3">
                        <label for="category_select" class="text-slate-200">Category</label><br>
                        <select name="category_select" id="category_select" class="text-slate-800 w-full mt-2 mb-10 bg-slate-100 rounded-md p-2" required>
                        </select>
                    </div>

                    <div class="mt-5">
                        <input id="add_transaction" type="submit" value="Add Transaction" class="hover:bg-emerald-600 w-full bg-emerald-500 rounded-md p-2 font-bold text-white">
                    </div>
                </form>
            </div>
        </section>

        <!-- CHARTS -->
        <section class="grid grid-cols-2 gap-4 mt-5">
            <div class="rounded-md shadow-md p-4 max-h-[900px] overflow-auto bg-slate-700">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-left font-bold text-lg text-slate-100">Transactions</p>
                    <select id="sort_category" onchange="renderData()" 
                        class="text-slate-800 bg-slate-100 rounded-md p-1 text-sm">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <table id="transaction_table" class="table-auto w-full">
                    <tbody id="transaction_body">
                        
                    </tbody>
                </table>
            </div>

            <div class="rounded-md shadow-md p-4 bg-slate-700">
                <p class="text-left font-bold text-lg text-slate-100">Spending by Category</p>
                <div>
                    <canvas id="myChart" class="mt-5"></canvas>
                </div>
            </div>
        </section>

    </div>
</body>
<script src="js/Project-js.js"></script>
</html>
